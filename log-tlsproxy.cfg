rootCategory=WARN,tlsproxy
appender.tlsproxy=RollingFileAppender
appender.tlsproxy.fileName=${SPLUNK_HOME}/var/log/splunk/tlsproxy.log
appender.tlsproxy.maxFileSize=25000000 # default: 25MB (specified in bytes).
appender.tlsproxy.maxBackupIndex=5
appender.tlsproxy.layout=PatternLayout
appender.tlsproxy.layout.ConversionPattern=%d{%m-%d-%Y %H:%M:%S.%l %z} %-5p %c [%T %t]  - %m%n
appender.confchangelogger.maxMessageSize=25000000 
category.TLSProxy=INFO,tlsproxy
category.SidecarThread=INFO,tlsproxy
