[script:mcp_script]
match = /mcp
script = mcp_server.py
handler = mcp_server.MCPRestHandler
python.version = python3
requireAuthentication = false
output_modes = json
scripttype = persist
passSystemAuth = true
passHttpHeaders = true
passPayload = true

[script:mcp_tools]
match = /mcp_tools
script = mcp_tools_handler.py
handler = mcp_tools_handler.MCPToolsRestHandler
python.version = python3
requireAuthentication = true
capability = mcp_tool_admin
output_modes = json
scripttype = persist
passSystemAuth = true
passPayload = true
passSession = true
passHttpHeaders = true

[script:mcp_token]
match = /mcp_token
script = mcp_token_handler.py
handler = mcp_token_handler.MCPTokenHandler
python.version = python3
requireAuthentication = true
capability = mcp_tool_admin
output_modes = json
scripttype = persist
passSystemAuth = true
passSession = true
passPayload = true
