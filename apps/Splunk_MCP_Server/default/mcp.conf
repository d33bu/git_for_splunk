# mcp.conf
# Configuration file for MCP (Model Context Protocol) server
# This file configures the MCP server settings for Splunk integration

[server]
# This stanza configures the MCP server settings

# Timeout in seconds for requests to Splunk
# This applies to all API calls made to the Splunk REST API
# Default: 60.0
timeout = 60.0

# Maximum number of rows that can be returned in a single query
# This is a safety limit to prevent excessive resource usage
# Default: 1000
max_row_limit = 1000

# Default number of rows to return when no limit is specified
# This is used when tools don't specify a row_limit parameter
# Default: 100
default_row_limit = 100

# SSL verification behavior for requests to Splunk.
# Accepted values:
#   true     : Verify SSL certificates using system CAs (default)
#   false    : Disable verification (NOT recommended for production)
#   <path>   : Path to a custom CA bundle or self-signed certificate (PEM/CRT)
#   none     : Ignore this setting and fall back to PYTHONHTTPSVERIFY or default
# Examples:
#   ssl_verify = true
#   ssl_verify = false
#   ssl_verify = /opt/splunk/etc/auth/myCA.pem
# If not set or set to 'none', the application honors PYTHONHTTPSVERIFY env var, else defaults to true.
# ssl_verify = true

# Require incoming bearer tokens to be RSA encrypted using the server's public key.
# When enabled (true), any token that cannot be successfully decrypted will be rejected (HTTP 401).
# When disabled (false), plaintext tokens are accepted and decryption is attempted opportunistically.
# Default: true
require_encrypted_token = true

# How often (in seconds) to reload RSA keys from secure storage.
# This is used by TokenCrypto to refresh cached keys in long-running processes.
# This set to 300 seconds (5 minutes) by default on Splunk SH Clustered environments to pick up key rotations.
# In non-clustered environments, this is disabled by default.
# Default: 300 on Splunk SH Clustered environments
#            0 on non-clustered environments
# token_key_reload_interval_seconds = 0
