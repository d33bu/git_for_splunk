<!DOCTYPE html>
<html lang="">
    <head>
        <meta charset="utf-8" />
        <title>Dashboard</title>
        <style>
            @font-face {
                font-family: 'Splunk Platform Sans';
                src: url('fonts/proxima-regular-webfont.woff') format('woff');
                font-weight: normal;
                font-style: normal;
                text-rendering: optimizeLegibility;
            }

            /* semibold */
            @font-face {
                font-family: 'Splunk Platform Sans';
                src: url('fonts/proxima-semibold-webfont.woff') format('woff');
                font-weight: 500;
                font-style: normal;
                text-rendering: optimizeLegibility;
            }

            /* bold */
            @font-face {
                font-family: 'Splunk Platform Sans';
                src: url('fonts/proxima-bold-webfont.woff') format('woff');
                font-weight: bold;
                font-style: normal;
                text-rendering: optimizeLegibility;
            }

            /* Obtained from bootstrap-enterprise.css */
            @font-face {
                font-family: 'Splunk Platform Mono';
                src: url('fonts/inconsolata-regular.woff') format('woff');
                font-weight: 400;
                font-style: normal;
            }

            body {
                margin: 0;
            }

            /* Obtained from bootstrap-enterprise.css */
            img {
                max-width: 100%;
                height: auto;
                vertical-align: middle;
                border: 0;
            }

            body,
            textarea {
                font-family: Splunk Platform Sans, Proxima, Nova, Roboto, Droid, Helvetica Neue, Helvetica, Arial,
                    sans-serif;
            }

            [data-test='wait-spinner'] > svg {
                animation: none;
                -webkit-animation: none;
            }

            div#root {
                background-color: var(--color-background-studio);
            }
        </style>
    </head>
    <body>
        <div id="container"></div>
        <script charset="utf-8" src="./core/i18n.js"></script>
        <script charset="utf-8" src="./legacy.js"></script>
    </body>
</html>
