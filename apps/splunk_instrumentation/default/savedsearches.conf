# Version Control telemetry metrics
[instrumentation.usage.versionControl.report]
action.outputtelemetry = 1
action.outputtelemetry.param.anonymous     = 1
action.outputtelemetry.param.support       = 1
action.outputtelemetry.param.license       = 0
action.outputtelemetry.param.optinrequired = 3
action.outputtelemetry.param.component = usage.versionControl.report
action.outputtelemetry.param.input = data
action.outputtelemetry.param.type = aggregate
alert.suppress = 0
alert.track = 0
counttype = number of events
cron_schedule = 0 3 * * *
dispatch.earliest_time = -1d
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
enableSched = 1
quantity = 0
relation = greater than
search = index=_internal ( \
        (source=*/var/log/splunk/metrics.log* group=version_control name=stats) OR \
        (sourcetype=splunkd_access uri="/services/configs/conf-server/_reload")) \
                [| rest /services/server/status splunk_server=local | return 1 host=splunk_server] \
                | eval status=coalesce(status, "X") \
                | stats latest(bytes) as bytes, \
                        latest(tracked_file_count) as tracked_file_count, \
                        latest(total_commits) as total_commits, \
                        count(eval(sourcetype="splunkd_access")) as count \
                        by status \
                | eval repo = if(isnull(total_commits), null(), json_object("bytes", bytes, "tracked_file_count", tracked_file_count, "total_commits", total_commits)), \
                        endpoint = if(isnotnull(total_commits), null(), json_object(status, count)) \
                | fields repo, endpoint \
                | mvcombine endpoint \
                | eval endpoint=if(mvcount(endpoint)=0, null(), mv_to_json_array(endpoint, true())) \
                | stats latest(repo) AS repository_snapshot, latest(endpoint) AS reload_rest_endpoint \
        | appendcols \
                [| rest splunk_server=local /services/server/info \
                | fields versionControlEnabled \
                | rename versionControlEnabled as enabled] \
        | makejson output=data
