| tojson output_field=json_item \
| fields json_item  \
| mvcombine delim="," json_item  \
| nomv json_item  \
| appendcols [| rest /services/server/info | fields guid] \
| eval has_data=if(isnull(json_item) OR json_item="", 0, 1) \
| where has_data=1 \
| fields- has_data \
| eval data="{ \"amUiApi\" : [" + json_item + "], \"guid\" : \"" + guid + "\"}" \
| eval date=strftime(now(), "%Y-%m-%d") \
| fields date, data

