[http]
route=has_key:_dstrx:typingQueue;has_key:_linebreaker:rulesetQueue;absent_key:_linebreaker:parsingQueue
disabled=1
port=8088
enableSSL=1
backpressureState=disabled
headerEnforcementMode = off
ackRequiredAnyCookie = AWSELB,AWSALB,AWSALBCORS,AWSELBCORS
dedicatedIoThreads=2
maxThreads = 0
maxSockets = 0
useDeploymentServer=0
rollingRestartReturnServerBusy=true
# ssl settings are similar to mgmt server
sslVersions=tls1.2
allowSslCompression=true
allowSslRenegotiation=true
ackIdleCleanup=true
