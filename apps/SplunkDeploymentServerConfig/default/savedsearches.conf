#   Version 10.0.2

[DeploymentServerClients]
search = | tstats prestats=t latest(data.lastPhoneHomeTime) values(data.lastPhoneHomeTime) latest(data.updaterRunning) where index=_dsphonehome earliest=$reloadTime$ latest=now `filter_by_client_id("$clientId$")` by data.clientId ``` Obtain phonehome values to calculate average PH time.``` \
```Obtain data from dsclient index to enrich phonehome data with client information.``` \
| tstats prestats=t append=t latest(data.build) latest(data.connectionId) latest(data.dns) \
           latest(data.guid) latest(data.hostname) latest(data.instanceId) \
           latest(data.instanceName) latest(data.ip) latest(data.mgmt) latest(data.name) latest(data.package) \
           latest(data.packageType) latest(data.splunkVersion) latest(data.utsname) where index=_dsclient earliest=1 latest=now `filter_by_client_id("$clientId$")` by \
           data.clientId \
```Instead of doing join operation on dsclient index, previous tstats queries obtain data from relevant indexes and merge them with stats command.``` \
| stats latest(data.lastPhoneHomeTime) as lastPhoneHomeTime values(data.lastPhoneHomeTime) as allphs latest(data.updaterRunning) as updaterRunning latest(data.build) as data.build latest(data.connectionId) as data.connectionId latest(data.dns) as data.dns \
           latest(data.guid) as data.guid latest(data.hostname) as data.hostname latest(data.instanceId) as data.instanceId \
           latest(data.instanceName) as data.instanceName latest(data.ip) as data.ip latest(data.mgmt) as data.mgmt latest(data.name) as data.name latest(data.package) as data.package \
           latest(data.packageType) as data.packageType latest(data.splunkVersion) as data.splunkVersion latest(data.utsname) as data.utsname by data.clientId \
```Discard entries from dsclient that do not have a matching entry from dsphonehome index. This emulates join operation.``` \
```A reverse is not necessary - every client that stored phonehome data will have a corresponding entry in dsclient index.``` \
| where lastPhoneHomeTime!="" \
| search `filter_by_phonehome($minPhoneHomeTime$)` \
```Obtain time after the initial processing of the phonehomes is finished.``` \
```Extract last 4 phonehomes and calculate averagePhoneHomeInterval``` \
| eval last4phs=mvindex(allphs,-4,-1) \
``` First phoneHome is the oldest one``` \
| eval oldestph=mvindex(last4phs,0) \
| eval newestph=mvindex(last4phs,-1) \
| eval deltacount=max(1,mvcount(last4phs)-1) \
| eval averagePhoneHomeInterval=floor((newestph-oldestph)/deltacount) \
```Use time() instead of now(), since now() runs at the beginning of search which makes it possible for lastPhoneHomeTime > now``` \
```Use floor() to discard millisecond resolution``` \
| eval actual_ratio=(floor(time())-lastPhoneHomeTime)/averagePhoneHomeInterval \
| search `filter_by_ratio("$greater_than$", $ratio$)` \
| fields - allphs oldestph newestph deltacount last4phs \
```Enrich client data with its latest applications data``` \
| join data.clientId type=left max=0 [ \
    ```Obtain latest application status.``` \
    | tstats latest(data.appName) as appName latest(data.serverClassName) as serverClassName \
      latest(data.action) as action latest(data.result) as result latest(data.failedReason) as failedReason \
      latest(data.checksum) as checksum latest(data.timestamp) as timestamp latest(data.clientId) \
      as data.clientId where index=_dsappevent earliest=$reloadTime$ latest=now \
      `filter_by_client_id("$clientId$")` `filter_by_app("$appName$")` `filter_by_action("$action$")` `filter_by_checksum($checksum$)` \
      `filter_by_error("$has_error$")` by data.key \
    | stats list(appName) as appName list(serverClassName) as serverClassName \
      list(action) as action list(result) as result list(failedReason) as failedReason \
      list(checksum) as checksum list(timestamp) as timestamp count(appName) as countApps by data.clientId \
    | eval appName=mvjoin(appName, "#") \
    | eval serverClassName=mvjoin(serverClassName, "#") \
    | eval action=mvjoin(action, "#") \
    | eval result=mvjoin(result, "#") \
    | eval failedReason=mvjoin(failedReason, "#") \
    | eval checksum=mvjoin(checksum, "#") \
    | eval timestamp=mvjoin(timestamp, "#") \
    ] \
| eval appName=split(appName, "#") \
| eval serverClassName=split(serverClassName, "#") \
| eval action=split(action, "#") \
| eval result=split(result, "#") \
| eval failedReason=split(failedReason, "#") \
| eval checksum=split(checksum, "#") \
| eval timestamp=split(timestamp, "#") \
| search `filter_by_app_count("$has_app_filter$")` \
| rename data.* as *

[DeploymentServerClientsBasic]
search = | tstats prestats=t latest(data.lastPhoneHomeTime) where index=_dsphonehome earliest=$reloadTime$ latest=now by data.clientId \
| tstats prestats=t append=t latest(data.build) latest(data.connectionId) latest(data.dns) \
           latest(data.guid) latest(data.hostname) latest(data.instanceId) \
           latest(data.instanceName) latest(data.ip) latest(data.mgmt) latest(data.name) latest(data.package) \
           latest(data.packageType) latest(data.splunkVersion) latest(data.utsname) where index=_dsclient earliest=1 latest=now \
           by data.clientId \
| stats latest(data.lastPhoneHomeTime) as lastPhoneHomeTime latest(data.build) as data.build latest(data.connectionId) as data.connectionId latest(data.dns) as data.dns \
           latest(data.guid) as data.guid latest(data.hostname) as data.hostname latest(data.instanceId) as data.instanceId \
           latest(data.instanceName) as data.instanceName latest(data.ip) as data.ip latest(data.mgmt) as data.mgmt latest(data.name) as data.name latest(data.package) as data.package \
           latest(data.packageType) as data.packageType latest(data.splunkVersion) as data.splunkVersion latest(data.utsname) as data.utsname by data.clientId \
| where lastPhoneHomeTime != "" \
| where "data.dns" != "" \
| rename data.* as * \
| eventstats count as total \
| head $offset_end$ \
| streamstats count as paginator \
| where paginator>$offset_start$

[DeploymentServerClientsByMachineType]
search = | tstats dc(sourcetype) AS sourcetypeCount values(data.utsname) as utsname \
  where (index=_dsphonehome earliest=$reloadTime$ ) OR index=_dsclient by data.clientId \
| where sourcetypeCount = 2```it works as inner join``` \
| stats count(utsname) as clients by utsname

[DeploymentServerAppEvents]
search = | tstats latest(data.appName) as appName latest(data.serverClassName) as serverClassName latest(data.action) as action \
         latest(data.result) as result latest(data.failedReason) as failedReason \
         latest(data.checksum) as checksum latest(data.timestamp) as timestamp latest(data.clientId) as clientId \
         where index=_dsappevent earliest=$reloadTime$ data.clientId IN ($clientIdList$) $result$ by data.key \
| stats list(appName) as appName list(serverClassName) as serverClassName list(action) as action list(result) as result list(failedReason) as failedReason \
        list(checksum) as checksum list(timestamp) as timestamp count(appName) as countApps by clientId

[DeploymentServerRecentDownloads]
search = | tstats latest(data.result) as result latest(data.action) as action \
where index=_dsappevent data.action!=Install earliest=$earliest$ latest=now \
by data.clientId data.serverClassName data.appName \
| search result=Ok action=Download \
| stats count as downloads

[DeploymentServerEventsWithError]
search = | tstats latest(data.failedReason) as failedReason latest(data.action) as action latest(data.timestamp) as timestamp \
            where index=_dsappevent earliest=$reloadTime$ data.result != Ok \
            by data.serverClassName, data.appName, data.clientId \
         | rename data.* as *

[DeploymentServerHasDeploymentErrorsPerAppAndServerclass]
search = | tstats count where index= _dsappevent earliest=$reloadTime$ $result$ $appName$ $serverClassNames$ \
           data.action=Download OR data.action=Install by data.clientId \
         | stats count as clients

[DeploymentServerGetPhonehomedClients]
search = | tstats dc(data.clientId) as clients where index=_dsphonehome earliest=$earliest$

[DeploymentServerLookupClient]
search = | search index=_dsclient data.clientId = $clientId$ \
         | rename data.* as * \
         | head 1

[DeploymentServerGetClientsUri]
search = | tstats latest(_time) as latesttime latest(data.ip) as latestip latest(data.mgmt) as latestmgmt \
where index=_dsclient earliest=1 by data.clientId \
| strcat "https://" latestip ":" latestmgmt clientUri \
| fields - latestip latestmgmt
