[script:upgrade]
python.version        = python3
python.required       = 3.13
match                 = /rolling_upgrade/upgrade
script                = proxy_upgrade.py
scripttype            = persist
handler               = application.UpgradeRestEndpoint
passSession           = true

[script:status]
python.version        = python3
python.required       = 3.13
match                 = /rolling_upgrade/status
script                = proxy_status.py
scripttype            = persist
handler               = application.StatusRestEndpoint
passSession           = true

[script:recovery]
python.version        = python3
python.required       = 3.13
match                 = /rolling_upgrade/recovery
script                = proxy_recovery.py
scripttype            = persist
handler               = application.RecoveryRestEndpoint
passSession           = true

